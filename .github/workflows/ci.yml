name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  rag-service-test:
    name: Python — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/rag-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio

      - name: Syntax check
        run: |
          python -m py_compile main.py lambda_handler.py
          python -m py_compile ingestion/processor.py
          python -m py_compile embeddings/embedder.py
          python -m py_compile retrieval/retriever.py
          python -m py_compile generation/generator.py
          python -m py_compile prompts/templates.py

      - name: Run tests
        env:
          MOCK_EMBEDDINGS: "true"
          MOCK_GENERATION: "true"
          VECTOR_STORE: "mock"
        run: |
          if [ -d tests ]; then
            pytest tests/ -v --tb=short
          else
            echo "No tests directory yet — skipping pytest"
          fi

  ts-typecheck:
    name: TypeScript — typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Typecheck API handlers
        run: npm run typecheck --workspace=apps/api

      - name: Typecheck CDK
        run: npx tsc --noEmit
        working-directory: infra/cdk
